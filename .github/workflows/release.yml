name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build release binaries
        env:
          CGO_ENABLED: '0'
        run: |
          set -eu
          mkdir -p dist
          for target in \
            linux/amd64 \
            linux/arm64 \
            darwin/amd64 \
            darwin/arm64
          do
            goos=${target%/*}
            goarch=${target#*/}
            binary="sub-switch-${goos}-${goarch}"
            echo "Building ${binary}"
            GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="-s -w" -o "dist/${binary}" ./cmd/sub-switch
          done
          (cd dist && sha256sum sub-switch-* > checksums.txt)

      - name: Generate changelog from semantic commits
        run: ./.github/scripts/release-notes.sh > RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/sub-switch-linux-amd64
            dist/sub-switch-linux-arm64
            dist/sub-switch-darwin-amd64
            dist/sub-switch-darwin-arm64
            dist/checksums.txt
